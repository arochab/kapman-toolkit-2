<!doctype html>
<!-- lang defaults to fr (the app's default locale); i18n.setLocale() keeps it in sync on toggle. -->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FR-default to match the app's default locale (the analyzer is free + 100% local). -->
    <meta name="description" content="CuePoint — une oreille de studio dans ton navigateur. Dépose ton son, entends la seule chose à corriger, et obtiens la correction exacte. L'analyse tourne entièrement sur ta machine ; le coach IA est une option payante." />
    <meta name="theme-color" content="#16181D" />
    <title>CuePoint</title>

    <!-- Fonts ("Silence" system): Fraunces (the spoken words — verdict, invitations),
         Inter Tight (body/UI), JetBrains Mono (ONLY plugin/param strings). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Favicon: Cue, the pool-water droplet -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='22'%20fill='%230A0C0F'/%3E%3Cpath%20d='M50%2018C66%2040%2076%2052%2076%2066C76%2082%2064%2090%2050%2090C36%2090%2024%2082%2024%2066C24%2052%2034%2040%2050%2018Z'%20fill='%232FCDE6'/%3E%3Cellipse%20cx='42'%20cy='52'%20rx='8'%20ry='6'%20fill='%23bfe9f3'%20opacity='0.7'/%3E%3C/svg%3E"
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CuePoint" />
    <meta property="og:description" content="Une oreille de studio dans ton navigateur. Entends la seule chose à corriger, puis corrige-la. L'analyse tourne en local ; coach IA en option payante." />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <!-- Svelte mounts into #app - see src/main.ts -->
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
