<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter Tight', sans-serif">
  <title>CuePoint Instagram Story — drop, listen, one fix</title>
  <desc>Vertical three-beat story on a dark Slate ground showing a liquid-glass cyan droplet across three states, ending on the verdict word PRESQUE with a producer-French fix, a mono honesty receipt, a github handle and a link-in-bio prompt.</desc>

  <defs>
    <radialGradient id="dropCore" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#9BEFF6"/>
      <stop offset="32%" stop-color="#4FD6E2"/>
      <stop offset="68%" stop-color="#2BA9B8"/>
      <stop offset="100%" stop-color="#16707C"/>
    </radialGradient>
    <radialGradient id="dropCoreSoft" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#8FE8F0"/>
      <stop offset="36%" stop-color="#42C7D4"/>
      <stop offset="72%" stop-color="#207E8C"/>
      <stop offset="100%" stop-color="#124E58"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#36C9D6" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#36C9D6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#36C9D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowStrong" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#36C9D6" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#36C9D6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#36C9D6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="irid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9F23C" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#36C9D6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F73CB0" stop-opacity="0.20"/>
    </linearGradient>
    <radialGradient id="hi" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="contactBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1080" height="1920" fill="#16181D"/>

  <text x="80" y="92" font-size="30" letter-spacing="3" fill="#9A9DA3" font-weight="500">cuepoint</text>
  <text x="1000" y="92" text-anchor="end" font-size="26" letter-spacing="2" fill="#6E727A">Analyseur &#183; Projets &#183; FR&#183;EN</text>

  <text x="80" y="170" font-family="'JetBrains Mono', monospace" font-size="26" letter-spacing="6" fill="#6E727A">01 — D&#201;POSE</text>
  <ellipse cx="540" cy="460" rx="240" ry="240" fill="url(#glowGrad)"/>
  <ellipse cx="540" cy="664" rx="120" ry="22" fill="#36C9D6" fill-opacity="0.07" filter="url(#contactBlur)"/>
  <g transform="translate(540 460)">
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="url(#dropCore)"/>
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="url(#irid)"/>
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="none" stroke="#9BEFF6" stroke-opacity="0.45" stroke-width="1.4"/>
    <ellipse cx="-40" cy="-44" rx="46" ry="58" fill="url(#hi)"/>
    <circle cx="-54" cy="-66" r="10" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="86" cy="74" rx="9" ry="26" fill="#BFF4FA" opacity="0.4" transform="rotate(26 86 74)"/>
    <circle cx="42" cy="78" r="9" fill="#FFFFFF" opacity="0.35"/>
  </g>
  <text x="540" y="730" text-anchor="middle" font-family="'Fraunces', serif" font-weight="300" font-size="78" fill="#E7E4DC">D&#233;pose ton son.</text>
  <text x="540" y="784" text-anchor="middle" font-size="32" fill="#9A9DA3">Cue &#233;coute, puis te dit la seule chose &#224; corriger.</text>

  <line x1="80" y1="864" x2="1000" y2="864" stroke="#36C9D6" stroke-width="1" opacity="0.5"/>

  <text x="80" y="950" font-family="'JetBrains Mono', monospace" font-size="26" letter-spacing="6" fill="#6E727A">02 — &#201;COUTE</text>
  <ellipse cx="540" cy="1130" rx="190" ry="190" fill="url(#glowStrong)"/>
  <ellipse cx="540" cy="1278" rx="92" ry="18" fill="#36C9D6" fill-opacity="0.07" filter="url(#contactBlur)"/>
  <g transform="translate(540 1130) scale(0.74)">
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="url(#dropCore)"/>
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="url(#irid)"/>
    <ellipse cx="-40" cy="-44" rx="46" ry="58" fill="url(#hi)"/>
    <circle cx="-54" cy="-66" r="10" fill="#FFFFFF" opacity="0.95"/>
  </g>
  <line x1="240" y1="1300" x2="840" y2="1300" stroke="#2A2D34" stroke-width="2"/>
  <line x1="240" y1="1300" x2="600" y2="1300" stroke="#36C9D6" stroke-width="2"/>
  <text x="200" y="1356" font-family="'JetBrains Mono', monospace" font-size="27" letter-spacing="1" fill="#E7E4DC">d&#233;codage</text>
  <text x="400" y="1356" font-family="'JetBrains Mono', monospace" font-size="27" letter-spacing="1" fill="#E7E4DC">loudness</text>
  <text x="600" y="1356" font-family="'JetBrains Mono', monospace" font-size="27" letter-spacing="1" fill="#36C9D6">true peak</text>

  <line x1="80" y1="1456" x2="1000" y2="1456" stroke="#36C9D6" stroke-width="1" opacity="0.5"/>

  <text x="80" y="1542" font-family="'JetBrains Mono', monospace" font-size="26" letter-spacing="6" fill="#6E727A">03 — LE FIX</text>
  <ellipse cx="980" cy="1556" rx="96" ry="96" fill="url(#glowGrad)"/>
  <g transform="translate(980 1556) scale(0.40)">
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="url(#dropCoreSoft)"/>
    <path d="M0 -150 C 84 -64, 132 4, 132 60 C 132 134, 70 184, 0 184 C -70 184, -132 134, -132 60 C -132 4, -84 -64, 0 -150 Z" fill="url(#irid)"/>
    <ellipse cx="-40" cy="-44" rx="46" ry="58" fill="url(#hi)"/>
    <circle cx="-54" cy="-66" r="10" fill="#FFFFFF" opacity="0.95"/>
  </g>
  <text x="80" y="1672" font-family="'Fraunces', serif" font-weight="300" font-size="138" letter-spacing="2" fill="#E7E4DC">PRESQUE<tspan fill="#36C9D6">.</tspan></text>
  <text x="80" y="1738" font-size="36" fill="#E7E4DC">Le bas mange les mids &#8212; donne au kick et &#224; la</text>
  <text x="80" y="1784" font-size="36" fill="#E7E4DC">basse chacun leur &#233;tage, pas plus de sub.</text>
  <text x="1000" y="1832" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="24" letter-spacing="1" fill="#6E727A">entendu : bas +6 dB &#183; phase ok &#183; pic -0.4 dBTP &#183; -9.2 LUFS</text>

  <text x="80" y="1892" font-family="'JetBrains Mono', monospace" font-size="22" letter-spacing="1" fill="#6E727A">github.com/arochab/cuepoint</text>
  <text x="1000" y="1892" text-anchor="end" font-family="'Fraunces', serif" font-weight="300" font-size="36" fill="#36C9D6">lien en bio &#8593;</text>
</svg>
