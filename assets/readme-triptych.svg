<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter Tight', 'Inter', sans-serif">
<title>CuePoint — the listening flow: drop your track, Cue listens, Cue gives one fix</title>
<desc>Three dark panels on the Slate ground. Left: the home door with a calm liquid-glass cyan droplet and the line "Depose ton son." Middle: the listening state with a brighter droplet, a cyan progress hairline and a four-stage mono stepper. Right: the cyan one-thing verdict PRESQUE, one producer-French fix sentence, and a mono honesty receipt across two lines.</desc>
<defs>
<radialGradient id="dropCore" cx="42%" cy="34%" r="68%">
<stop offset="0%" stop-color="#BFF4FA"/>
<stop offset="22%" stop-color="#6FE0EB"/>
<stop offset="52%" stop-color="#36C9D6"/>
<stop offset="82%" stop-color="#1C8C97"/>
<stop offset="100%" stop-color="#0E5159"/>
</radialGradient>
<radialGradient id="dropCoreSoft" cx="42%" cy="34%" r="70%">
<stop offset="0%" stop-color="#CFF6FB"/>
<stop offset="26%" stop-color="#7FE4EE"/>
<stop offset="58%" stop-color="#36C9D6"/>
<stop offset="86%" stop-color="#176E78"/>
<stop offset="100%" stop-color="#0B454C"/>
</radialGradient>
<radialGradient id="dropGlow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#36C9D6" stop-opacity="0.55"/>
<stop offset="45%" stop-color="#36C9D6" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#36C9D6" stop-opacity="0"/>
</radialGradient>
<radialGradient id="dropGlowStrong" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#36C9D6" stop-opacity="0.8"/>
<stop offset="40%" stop-color="#36C9D6" stop-opacity="0.32"/>
<stop offset="100%" stop-color="#36C9D6" stop-opacity="0"/>
</radialGradient>
<linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#9CF2D8" stop-opacity="0.5"/>
<stop offset="50%" stop-color="#36C9D6" stop-opacity="0"/>
<stop offset="100%" stop-color="#C9A8F2" stop-opacity="0.4"/>
</linearGradient>
<linearGradient id="glassHi" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
<stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
</linearGradient>
<filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="11"/>
</filter>
<filter id="softer" x="-80%" y="-80%" width="260%" height="260%">
<feGaussianBlur stdDeviation="18"/>
</filter>
</defs>

<rect x="0" y="0" width="1200" height="500" fill="#16181D"/>

<line x1="400" y1="46" x2="400" y2="454" stroke="#2A2D34" stroke-width="1"/>
<line x1="800" y1="46" x2="800" y2="454" stroke="#2A2D34" stroke-width="1"/>

<g>
<text x="40" y="46" fill="#9A9DA3" font-size="15" letter-spacing="1.5" opacity="0.7">cuepoint</text>
<text x="360" y="46" fill="#6E727A" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="0.6" text-anchor="end" opacity="0.6">Analyseur &#183; Projets &#183; FR&#183;EN</text>

<ellipse cx="200" cy="178" rx="92" ry="92" fill="url(#dropGlow)" filter="url(#softer)"/>
<ellipse cx="200" cy="282" rx="50" ry="9" fill="#36C9D6" opacity="0.07" filter="url(#soft)"/>
<g transform="translate(200 182)">
<path d="M0 -74 C 40 -30, 58 6, 58 30 C 58 64, 30 88, 0 88 C -30 88, -58 64, -58 30 C -58 6, -40 -30, 0 -74 Z" fill="url(#dropCoreSoft)"/>
<path d="M0 -74 C 40 -30, 58 6, 58 30 C 58 64, 30 88, 0 88 C -30 88, -58 64, -58 30 C -58 6, -40 -30, 0 -74 Z" fill="url(#iris)"/>
<path d="M0 -74 C 40 -30, 58 6, 58 30 C 58 64, 30 88, 0 88 C -30 88, -58 64, -58 30 C -58 6, -40 -30, 0 -74 Z" fill="none" stroke="#7FE4EE" stroke-width="1" stroke-opacity="0.45"/>
<ellipse cx="-16" cy="-22" rx="22" ry="34" fill="url(#glassHi)" opacity="0.65" transform="rotate(-18 -16 -22)"/>
<circle cx="-24" cy="-34" r="5" fill="#FFFFFF" opacity="0.9"/>
<circle cx="20" cy="44" r="9" fill="#CFF6FB" opacity="0.4" filter="url(#soft)"/>
</g>

<text x="200" y="318" fill="#E7E4DC" font-family="'Fraunces', Georgia, serif" font-weight="300" font-size="38" text-anchor="middle" letter-spacing="0.5">Depose ton son.</text>
<text x="200" y="352" fill="#9A9DA3" font-size="16" text-anchor="middle">Cue ecoute, puis te dit la seule chose a corriger.</text>

<line x1="158" y1="424" x2="242" y2="424" stroke="#36C9D6" stroke-width="1" opacity="0.55"/>
</g>

<g>
<text x="440" y="46" fill="#9A9DA3" font-size="15" letter-spacing="1.5" opacity="0.7">cuepoint</text>
<text x="760" y="46" fill="#6E727A" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="0.6" text-anchor="end" opacity="0.6">Analyseur &#183; Projets &#183; FR&#183;EN</text>

<ellipse cx="600" cy="190" rx="120" ry="120" fill="url(#dropGlowStrong)" filter="url(#softer)"/>
<ellipse cx="600" cy="302" rx="58" ry="10" fill="#36C9D6" opacity="0.07" filter="url(#soft)"/>
<g transform="translate(600 194)">
<path d="M0 -80 C 43 -32, 63 7, 63 33 C 63 70, 33 95, 0 95 C -33 95, -63 70, -63 33 C -63 7, -43 -32, 0 -80 Z" fill="url(#dropCore)"/>
<path d="M0 -80 C 43 -32, 63 7, 63 33 C 63 70, 33 95, 0 95 C -33 95, -63 70, -63 33 C -63 7, -43 -32, 0 -80 Z" fill="url(#iris)"/>
<path d="M0 -80 C 43 -32, 63 7, 63 33 C 63 70, 33 95, 0 95 C -33 95, -63 70, -63 33 C -63 7, -43 -32, 0 -80 Z" fill="none" stroke="#9CF2D8" stroke-width="1.2" stroke-opacity="0.6"/>
<ellipse cx="-18" cy="-24" rx="24" ry="38" fill="url(#glassHi)" opacity="0.65" transform="rotate(-18 -18 -24)"/>
<circle cx="-26" cy="-38" r="6" fill="#FFFFFF" opacity="0.9"/>
<circle cx="22" cy="48" r="11" fill="#CFF6FB" opacity="0.5" filter="url(#soft)"/>
</g>

<line x1="480" y1="346" x2="720" y2="346" stroke="#2A2D34" stroke-width="2"/>
<line x1="480" y1="346" x2="620" y2="346" stroke="#36C9D6" stroke-width="2"/>
<circle cx="620" cy="346" r="3" fill="#36C9D6"/>

<text x="486" y="392" fill="#E7E4DC" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="0.4">decodage</text>
<text x="486" y="416" fill="#36C9D6" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="0.4">true peak</text>
<text x="620" y="392" fill="#E7E4DC" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="0.4">loudness</text>
<text x="620" y="416" fill="#6E727A" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="0.4">le fix</text>
</g>

<g>
<text x="840" y="46" fill="#9A9DA3" font-size="15" letter-spacing="1.5" opacity="0.7">cuepoint</text>
<text x="1160" y="46" fill="#6E727A" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="0.6" text-anchor="end" opacity="0.6">Analyseur &#183; Projets &#183; FR&#183;EN</text>

<ellipse cx="1000" cy="118" rx="66" ry="66" fill="url(#dropGlow)" filter="url(#softer)"/>
<ellipse cx="1000" cy="190" rx="34" ry="7" fill="#36C9D6" opacity="0.07" filter="url(#soft)"/>
<g transform="translate(1000 120)">
<path d="M0 -50 C 27 -20, 39 4, 39 20 C 39 43, 20 58, 0 58 C -20 58, -39 43, -39 20 C -39 4, -27 -20, 0 -50 Z" fill="url(#dropCoreSoft)"/>
<path d="M0 -50 C 27 -20, 39 4, 39 20 C 39 43, 20 58, 0 58 C -20 58, -39 43, -39 20 C -39 4, -27 -20, 0 -50 Z" fill="url(#iris)"/>
<path d="M0 -50 C 27 -20, 39 4, 39 20 C 39 43, 20 58, 0 58 C -20 58, -39 43, -39 20 C -39 4, -27 -20, 0 -50 Z" fill="none" stroke="#7FE4EE" stroke-width="1" stroke-opacity="0.45"/>
<ellipse cx="-11" cy="-15" rx="14" ry="22" fill="url(#glassHi)" opacity="0.65" transform="rotate(-18 -11 -15)"/>
<circle cx="-16" cy="-23" r="4" fill="#FFFFFF" opacity="0.9"/>
<circle cx="11" cy="30" r="6" fill="#CFF6FB" opacity="0.4" filter="url(#soft)"/>
</g>

<text x="820" y="262" fill="#E7E4DC" font-family="'Fraunces', Georgia, serif" font-weight="300" font-size="60" letter-spacing="1">PRESQUE<tspan fill="#36C9D6">.</tspan></text>

<text x="820" y="312" fill="#E7E4DC" font-size="16" letter-spacing="0.1">Le bas mange les mids &#8212; donne au kick et a la basse</text>
<text x="820" y="338" fill="#E7E4DC" font-size="16" letter-spacing="0.1">chacun leur etage, pas plus de sub.</text>

<line x1="820" y1="372" x2="1160" y2="372" stroke="#2A2D34" stroke-width="1"/>
<text x="1160" y="396" fill="#6E727A" font-family="'JetBrains Mono', monospace" font-size="15" text-anchor="end" letter-spacing="0.2">bas +6 dB &#183; phase ok</text>
<text x="1160" y="418" fill="#6E727A" font-family="'JetBrains Mono', monospace" font-size="15" text-anchor="end" letter-spacing="0.2">pic -0.4 dBTP &#183; -9.2 LUFS</text>

<text x="820" y="454" fill="#36C9D6" font-size="16">guide-moi &#8594;</text>
<text x="924" y="454" fill="#6E727A" font-size="16">les chiffres</text>
</g>
</svg>
